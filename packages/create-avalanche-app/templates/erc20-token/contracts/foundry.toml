[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Pinned: lib/*-artifact.ts is checked in CI against this exact compiler's
# output (contracts-ci/scripts/check-artifacts.mjs), so a version drift here
# silently desyncs source from shipped bytecode.
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
fuji = "https://api.avax-test.network/ext/bc/C/rpc"
