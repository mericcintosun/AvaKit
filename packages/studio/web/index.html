<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AvaKit Studio</title>
    <style>
      :root {
        --bg: #ffffff; --fg: #0a0a0a; --muted: #6b7280; --border: #e5e7eb;
        --card: #fafafa; --ok: #0a0a0a; --off: #c4c4c4;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a; --fg: #ededed; --muted: #8b8b8b; --border: #232323;
          --card: #121212; --ok: #ededed; --off: #3a3a3a;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--fg); font-family: var(--sans);
        -webkit-font-smoothing: antialiased; line-height: 1.5;
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
      header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
      h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
      .tag { color: var(--muted); font-size: 0.875rem; margin: 6px 0 40px; }
      .sec { margin-bottom: 32px; }
      .sec-title {
        font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--muted); margin: 0 0 12px; font-weight: 600;
      }
      .card { border: 1px solid var(--border); border-radius: 12px; background: var(--card); overflow: hidden; }
      .row {
        display: flex; align-items: center; justify-content: space-between; gap: 16px;
        padding: 14px 16px; border-top: 1px solid var(--border);
      }
      .row:first-child { border-top: none; }
      .row .l { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; background: var(--off); }
      .dot.on { background: var(--ok); }
      .name { font-weight: 500; }
      .ver { color: var(--muted); font-family: var(--mono); font-size: 0.8rem; }
      .hint { color: var(--muted); font-family: var(--mono); font-size: 0.75rem; text-align: right; word-break: break-all; }
      .pill {
        font-family: var(--mono); font-size: 0.7rem; padding: 2px 8px; border: 1px solid var(--border);
        border-radius: 999px; color: var(--muted);
      }
      .empty { color: var(--muted); font-size: 0.875rem; padding: 16px; }
      code { font-family: var(--mono); font-size: 0.85em; }
      .footer { color: var(--muted); font-size: 0.75rem; margin-top: 48px; }
      .chip { display: inline-block; font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>AvaKit Studio</h1>
        <span class="pill" id="status">connecting…</span>
      </header>
      <p class="tag">Local control center for Avalanche development — L1s, Interchain Messaging, and devnets.</p>
      <div id="app"></div>
      <p class="footer">
        Running locally on your machine · read-only inventory ·
        <span class="chip" id="cwd"></span>
      </p>
    </div>

    <script>
      const TOKEN = (window.__AVAKIT_STUDIO__ || {}).token;
      const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h != null) e.innerHTML = h; return e; };

      async function api(path) {
        const res = await fetch(path, { headers: { "x-studio-token": TOKEN } });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      }

      function toolRow(t) {
        const row = el("div", "row");
        const left = el("div", "l");
        left.appendChild(el("span", "dot" + (t.installed ? " on" : "")));
        left.appendChild(el("span", "name", t.name));
        row.appendChild(left);
        if (t.installed) {
          row.appendChild(el("span", "ver", t.version || "installed"));
        } else {
          row.appendChild(el("span", "hint", t.hint ? "install: <code>" + t.hint + "</code>" : "not installed"));
        }
        return row;
      }

      function section(title, node) {
        const s = el("div", "sec");
        s.appendChild(el("p", "sec-title", title));
        s.appendChild(node);
        return s;
      }

      function render(inv) {
        const app = document.getElementById("app");
        app.innerHTML = "";
        document.getElementById("cwd").textContent = inv.cwd;

        // Toolchain
        const tools = el("div", "card");
        inv.tools.forEach((t) => tools.appendChild(toolRow(t)));
        app.appendChild(section("Toolchain", tools));

        // Project
        const p = inv.project;
        const proj = el("div", "card");
        const prow = el("div", "row");
        const pl = el("div", "l");
        pl.appendChild(el("span", "dot" + (p.isAvaKit ? " on" : "")));
        pl.appendChild(el("span", "name", p.name || "(no package.json here)"));
        prow.appendChild(pl);
        prow.appendChild(el("span", "ver", p.isAvaKit ? "AvaKit project" : "not an AvaKit project"));
        proj.appendChild(prow);
        if (p.template) proj.appendChild(kv("Template", p.template));
        proj.appendChild(kv("Contracts", p.hasContracts ? "Foundry ✓" : "—"));
        app.appendChild(section("Project", proj));

        // Local L1s
        const l1card = el("div", "card");
        if (inv.localL1s.length) {
          inv.localL1s.forEach((n) => {
            const r = el("div", "row");
            const l = el("div", "l");
            l.appendChild(el("span", "dot on"));
            l.appendChild(el("span", "name", n));
            r.appendChild(l);
            r.appendChild(el("span", "ver", "avalanche-cli L1"));
            l1card.appendChild(r);
          });
        } else {
          l1card.appendChild(el("div", "empty", "No local L1s yet. Create one with <code>avalanche blockchain create</code> — devnet controls arrive in Studio soon."));
        }
        app.appendChild(section("Local L1s", l1card));
      }

      function kv(k, v) {
        const r = el("div", "row");
        r.appendChild(el("span", "name", k));
        r.appendChild(el("span", "ver", v));
        return r;
      }

      (async () => {
        const status = document.getElementById("status");
        try {
          await api("/api/health");
          const inv = await api("/api/env");
          status.textContent = "● live";
          render(inv);
        } catch (e) {
          status.textContent = "offline";
          document.getElementById("app").innerHTML =
            '<div class="card"><div class="empty">Could not reach the Studio server. ' + (e && e.message ? e.message : "") + "</div></div>";
        }
      })();
    </script>
  </body>
</html>
