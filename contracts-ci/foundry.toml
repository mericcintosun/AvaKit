# Repo-only Foundry harness for the template contracts. Not part of any npm
# package — templates stay zero-dependency; this directory exists so CI can
# actually compile and test the Solidity the templates ship.
#
# The solc pin matters: lib/*-artifact.ts files are checked against output of
# THIS compiler version (scripts/check-artifacts.mjs), so bumping it means
# regenerating every artifact in the same commit.
[profile.default]
src = "src"
test = "test"
out = "out"
libs = []
# 0.8.28 matches the compiler the shipped artifacts were generated with
# (solc version is embedded in the bytecode's CBOR metadata tail).
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
