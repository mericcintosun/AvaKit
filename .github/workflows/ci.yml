name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # Scaffold every create-avalanche-app template from the LOCAL build and verify it
  # installs, type-checks, and production-builds — the real `npm create avalanche-app`
  # flow. One broken template fails only its own matrix leg (fail-fast: false).
  # Templates that need avalanche-cli at runtime (icm-messenger, l1-launch,
  # token-bridge) are scaffold+typecheck+build tested only; their devnet/L1 scripts
  # are not exercised here (no avalanche-cli in CI).
  #
  # @avakit/* is packed from THIS repo and injected as pnpm overrides, so a template
  # that needs an unpublished core feature is verified before release. Run
  # `SMOKE_USE_NPM=1 scripts/smoke-template.sh <id>` after a release to verify the
  # per-package pins the scaffolder stamps really resolve from npm.
  smoke-templates:
    name: Smoke · ${{ matrix.template }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - minimal
          - nft-mint
          - token-gated-app
          - erc20-token
          - icm-messenger
          - eerc-token
          - l1-launch
          - token-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @avakit/* and the scaffolder
        run: pnpm --filter "@avakit/core" --filter "@avakit/react" --filter create-avalanche-app build

      - name: Scaffold + typecheck + build "${{ matrix.template }}"
        run: bash scripts/smoke-template.sh "${{ matrix.template }}" "$RUNNER_TEMP/smoke"
