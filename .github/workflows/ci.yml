name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # Scaffold every create-avalanche-app template from the LOCAL build and verify it
  # installs, type-checks, and production-builds — the real `npm create avalanche-app`
  # flow. One broken template fails only its own matrix leg (fail-fast: false).
  # Templates that need avalanche-cli at runtime (icm-messenger, l1-launch,
  # token-bridge) are scaffold+typecheck+build tested only; their devnet/L1 scripts
  # are not exercised here (no avalanche-cli in CI).
  #
  # @avakit/* is packed from THIS repo and injected as pnpm overrides, so a template
  # that needs an unpublished core feature is verified before release. Run
  # `SMOKE_USE_NPM=1 scripts/smoke-template.sh <id>` after a release to verify the
  # per-package pins the scaffolder stamps really resolve from npm.
  smoke-templates:
    name: Smoke · ${{ matrix.template }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - minimal
          - nft-mint
          - token-gated-app
          - erc20-token
          - icm-messenger
          - eerc-token
          - l1-launch
          - token-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @avakit/* and the scaffolder
        run: pnpm --filter "@avakit/core" --filter "@avakit/react" --filter create-avalanche-app build

      - name: Scaffold + typecheck + build "${{ matrix.template }}"
        run: bash scripts/smoke-template.sh "${{ matrix.template }}" "$RUNNER_TEMP/smoke"

  # Compile and test the Solidity the templates ship, and verify the shipped
  # lib/*-artifact.ts files still match the .sol sources (they are hand-copied
  # from forge output, so nothing else guards against silent drift).
  # See contracts-ci/README.md. Foundry is pinned to a stable release so local
  # and CI builds emit identical bytecode (solc itself is pinned in the
  # foundry.toml files).
  contracts:
    name: Contracts · forge test · artifact parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.7.1

      - name: Sync template contracts (copy-identity check)
        working-directory: contracts-ci
        run: node scripts/sync.mjs

      - name: Forge tests
        working-directory: contracts-ci
        run: forge test -vvv

      - name: Artifact parity (lib/*-artifact.ts vs source)
        working-directory: contracts-ci
        run: node scripts/check-artifacts.mjs
