name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm >= 11.5.1, so the runner's bundled npm
      # can be too old to exchange the id-token — but this must NOT be `npm@latest`.
      #
      # npm 12 changed `npm info <pkg> --json` to return an array where 11 returned
      # the packument object. Changesets reads `pkgInfo.versions` off that result,
      # which is `undefined` on an array, so it concluded every package was
      # unpublished, tried to republish all five, and npm refused with "cannot
      # publish over the previously published versions" — turning every release red
      # while the real publishes actually succeeded. Pinning to 11 keeps OIDC (11.18
      # >= 11.5.1) and keeps the shape changesets can read.
      #
      # Revisit only once changesets handles npm 12's output.
      - name: Use an npm that supports OIDC
        run: npm install -g npm@11

      - name: Install
        run: pnpm install --frozen-lockfile

      # When changesets exist on main, opens/updates a "Version Packages" PR.
      # When that PR is merged (versions bumped, changesets consumed), publishes.
      #
      # Publishing uses npm **trusted publishing (OIDC)** — no long-lived NPM_TOKEN.
      # Each package must have a Trusted Publisher configured on npmjs.com pointing
      # at this repo + `release.yml`. The exchanged id-token also produces a
      # provenance attestation, so npm can prove the tarball was built here.
      - name: Create Release PR or Publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
