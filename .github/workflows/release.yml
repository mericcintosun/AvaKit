name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm >= 11.5.1; pin to latest so the runner's
      # bundled npm can never be too old to exchange the id-token.
      - name: Use an npm that supports OIDC
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      # When changesets exist on main, opens/updates a "Version Packages" PR.
      # When that PR is merged (versions bumped, changesets consumed), publishes.
      #
      # Publishing uses npm **trusted publishing (OIDC)** — no long-lived NPM_TOKEN.
      # Each package must have a Trusted Publisher configured on npmjs.com pointing
      # at this repo + `release.yml`. The exchanged id-token also produces a
      # provenance attestation, so npm can prove the tarball was built here.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
